name: Build opdes
 
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: opdes-windows
            executable: opdes.exe
          - os: macos-latest
            artifact_name: opdes-macos
            executable: opdes
          - os: ubuntu-latest
            artifact_name: opdes-linux
            executable: opdes

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests beautifulsoup4 tqdm urllib3

      - name: Build executable
        run: |
          pyinstaller --clean --noconfirm --onefile --name opdes /src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.executable }}

